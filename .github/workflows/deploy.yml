name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsm6 libxext6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # Provide dummy env vars so config validation passes during tests
        env:
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_KEY: "test-key"
          TAVILY_API_KEY: "tvly-test"
          API_SECRET_KEY: "test-secret"
        run: |
          pytest tests/ -v


  # Railway auto-deploys from this repo via its GitHub integration.
  # No manual deploy step needed here.
